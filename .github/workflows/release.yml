name: Release

on:
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:

env:
  upstream_owner: 'crummy'
  upstream_repo: 'BeautifulSoup'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read

    steps:
    - name: Checkout self repo
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v6

    - name: Get latest BS4 version
      id: get_version
      run: |
        version=$(curl -s "https://www.crummy.com/software/BeautifulSoup/bs4/doc/" | \
          grep -oP 'Beautiful Soup version \K[0-9.]+' | head -1 | sed 's/\.$//')
        echo "version=$version" >> $GITHUB_OUTPUT
        echo "Latest BS4 version: $version"

    - name: Check if version tag already exists
      id: check_version
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        VERSION: ${{ steps.get_version.outputs.version }}
        REPO: ${{ github.repository }}
      run: |
        status=$(curl -s -o /dev/null -w "%{http_code}" -H "Authorization: Bearer $GH_TOKEN" \
          "https://api.github.com/repos/$REPO/releases/tags/$VERSION")
        if [ "$status" = "200" ]; then
          echo "should_release=false" >> $GITHUB_OUTPUT
          echo "Release $VERSION already exists in $REPO, skipping..."
        else
          echo "should_release=true" >> $GITHUB_OUTPUT
        fi

    - name: Set up Python
      if: ${{ steps.check_version.outputs.should_release == 'true' }}
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
      with:
        python-version: "3.12"

    - name: Install dependencies
      if: ${{ steps.check_version.outputs.should_release == 'true' }}
      run: pip install bs4 requests

    - name: Run bs4-to-dash.py
      if: ${{ steps.check_version.outputs.should_release == 'true' }}
      run: python bs4-to-dash.py

    - name: Create tgz
      if: ${{ steps.check_version.outputs.should_release == 'true' }}
      run: |
        tar --exclude='.DS_Store' -czf "Beautiful_Soup_4.tgz" "Beautiful_Soup_4.docset"
        rm -rf "Beautiful_Soup_4.docset"

    - name: Generate checksums.txt
      if: ${{ steps.check_version.outputs.should_release == 'true' }}
      run: |
        sha256sum Beautiful_Soup_4.tgz > checksums.txt

    - name: Create GitHub Release
      if: ${{ steps.check_version.outputs.should_release == 'true' }}
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        VERSION: ${{ steps.get_version.outputs.version }}
      run: |
        gh release create "$VERSION" \
          Beautiful_Soup_4.tgz \
          checksums.txt \
          --title "$VERSION" \
          --notes "Source: https://github.com/crummy/BeautifulSoup"

    - name: Create or update XML file
      if: ${{ steps.check_version.outputs.should_release == 'true' }}
      env:
        VERSION: ${{ steps.get_version.outputs.version }}
      run: |
        TAG="$VERSION"
        echo "<entry>" > Beautiful_Soup_4.xml
        echo "  <name>Beautiful Soup 4</name>" >> Beautiful_Soup_4.xml
        echo "  <version>$VERSION</version>" >> Beautiful_Soup_4.xml
        echo "  <url>https://github.com/${{ github.repository }}/releases/download/$TAG/Beautiful_Soup_4.tgz</url>" >> Beautiful_Soup_4.xml
        echo "</entry>" >> Beautiful_Soup_4.xml

    - name: Commit and push XML
      if: ${{ steps.check_version.outputs.should_release == 'true' }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        TAG: ${{ steps.get_version.outputs.version }}
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        git fetch origin
        git checkout ${GITHUB_REF_NAME} || git checkout -b ${GITHUB_REF_NAME}
        git add Beautiful_Soup_4.xml 2>/dev/null || true
        if git diff --cached --quiet; then
          echo "No changes to Beautiful_Soup_4.xml, skipping commit."
          exit 0
        fi
        git commit -m "Update Beautiful_Soup_4.xml for release $TAG"
        git push origin HEAD:${GITHUB_REF_NAME}
